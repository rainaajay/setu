app = "setu-auth-4"
primary_region = "sin"

[build]
  dockerfile = "../../Dockerfile"

[env]
  SETU_AUTHORITY = "auth-4"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
